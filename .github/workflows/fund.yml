name: fund-feed

on:
  workflow_dispatch:
  schedule:
     - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: check files
        run: |
          echo "--- repo root ---"
          ls -la
          echo "--- data/ ---"
          ls -la data/ 2>/dev/null || echo "!! data/ 目录不存在"
          echo "--- calendar_seed.json ---"
          if [ -f data/calendar_seed.json ]; then
            echo "OK: 存在, $(wc -c < data/calendar_seed.json) 字节"
            python -c "import json;d=json.load(open('data/calendar_seed.json',encoding='utf-8'));print('anchors:',len(d['anchors']),'manual_sources:',len(d['manual_sources']))"
          else
            echo "!! 缺失 data/calendar_seed.json -- 日历将没有手工锚点"
          fi

      - name: selftest
        run: python -u fund_feed.py --selftest

      - name: harvest
        run: python -u fund_feed.py --live --pages 45 --until 2024-01-01

      - name: list data
        if: always()
        run: ls -la data/ || echo "no data dir"

      - name: commit
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add -A data
          git commit -m "update $(date -u +%F)" || echo "nothing to commit"
          git push || echo "nothing to push"

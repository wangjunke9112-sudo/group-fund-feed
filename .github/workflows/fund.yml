name: fund-feed

on:
  workflow_dispatch:          # 手动 Run workflow 按钮
  # schedule:                 # 确认稳定后，取消下面两行注释即可每天自动跑
  #   - cron: '0 22 * * *'    # UTC 22:00 = 北京时间次日 06:00

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 离线自测
        run: python -u fund_feed.py --selftest
      - name: 探测各源
        run: python -u fund_feed.py --probe
      
      - name: 找翻页格式
        run: |
          python3 -u - <<'PY'
          import re
          t = open("data/list_raw.html", encoding="utf-8").read()
          print("=== 含 index_ 的片段 ===")
          for m in re.finditer(r'.{120}index_.{120}', t, re.S):
              print(repr(m.group(0)), "\n---")
          print("=== 含 分页/下一页/尾页 的片段 ===")
          for kw in ["下一页", "尾页", "末页", "分页", "共", "页"]:
              i = t.find(kw)
              if i > 0:
                  print(f"[{kw}]", repr(t[max(0,i-250):i+250]), "\n---")
          print("=== 含 page 的 script 片段 ===")
          for m in re.finditer(r'.{100}(?:createPage|pageCount|currentPage|totalPage|pageSize).{200}', t, re.S):
              print(repr(m.group(0)), "\n---")
          PY
          
      - name: 真实抓取
        run: python -u gz_fund_poc.py --live --pages 25 --until 2024-01-01
        
      - name: 查看生成的文件
        if: always()
        run: ls -la data/ || echo "data 目录不存在"

      - name: 写回仓库
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add -A data
          git commit -m "update notices $(date -u +%F)" || echo "无变化"
          git push || echo "无需推送"

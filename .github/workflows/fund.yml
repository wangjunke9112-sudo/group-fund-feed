name: fund-feed

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: selftest
        run: python -u fund_feed.py --selftest

      - name: harvest
        run: python -u fund_feed.py --live --pages 3

      - name: list data
        if: always()
        run: ls -la data/ || echo "no data dir"

      - name: commit
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add -A data
          git commit -m "update $(date -u +%F)" || echo "nothing to commit"
          git push || echo "nothing to push"

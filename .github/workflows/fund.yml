name: fund-feed

on:
  workflow_dispatch:          # 手动 Run workflow 按钮
  # schedule:                 # 确认稳定后，取消下面两行注释即可每天自动跑
  #   - cron: '0 22 * * *'    # UTC 22:00 = 北京时间次日 06:00

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 离线自测
        run: python -u gz_fund_poc.py --selftest

      - name: 真实抓取
        run: python -u gz_fund_poc.py --live --pages 1

      - name: 查看生成的文件
        if: always()
        run: ls -la data/ || echo "data 目录不存在"

      - name: 写回仓库
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add -A data
          git commit -m "update notices $(date -u +%F)" || echo "无变化"
          git push || echo "无需推送"

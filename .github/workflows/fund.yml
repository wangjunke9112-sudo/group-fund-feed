name: fund-feed
on:
  workflow_dispatch:          # 手动"Run workflow"按钮
  # schedule:                 # 想每天自动跑再取消注释
  #   - cron: '0 22 * * *'    # UTC 22:00 = 北京时间 06:00
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 离线自测
        run: python gz_fund_poc.py --selftest
      - name: dump原始HTML
        run: python dump.py
      - name: 把结果写回仓库
        if: always()
        run: |
          mkdir -p data
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git commit -m "update notices $(date -u +%F)" || echo "无变化"
          git push || echo "无需推送"
